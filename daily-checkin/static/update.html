<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Update</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 480px; margin: 0 auto; padding: 16px;
            background: #0d1117; color: #c9d1d9;
        }
        h1 { color: #58a6ff; margin-bottom: 20px; text-align: center; font-size: 1.5rem; }
        h2 { color: #8b949e; font-size: 0.9rem; text-transform: uppercase;
             letter-spacing: 0.05em; margin: 20px 0 10px; border-bottom: 1px solid #21262d;
             padding-bottom: 6px; }
        .field { margin-bottom: 14px; }
        label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 0.95rem; }
        .hint { color: #8b949e; font-size: 0.8rem; margin-bottom: 4px; }
        input[type="number"], input[type="time"], select {
            width: 100%; padding: 10px; border: 1px solid #30363d; border-radius: 6px;
            background: #161b22; color: #c9d1d9; font-size: 1rem;
        }
        input:focus, select:focus { outline: none; border-color: #58a6ff; }
        button[type="submit"] {
            width: 100%; padding: 14px; margin-top: 24px; border: none; border-radius: 8px;
            background: #238636; color: #fff; font-size: 1.1rem; font-weight: 600;
            cursor: pointer;
        }
        button[type="submit"]:active { background: #2ea043; }
        .back-link { display: block; text-align: center; margin-bottom: 16px; color: #58a6ff;
                     text-decoration: none; font-size: 0.95rem; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Daily Update</h1>
    <a href="/" class="back-link">&larr; Back to home</a>
    <div class="hint" style="text-align:center; margin-bottom:16px;">All fields are optional. Counter fields can only increase.</div>
    <form action="/update" method="POST">

        <h2>Mental State</h2>

        <div class="field">
            <label for="mood">Mood (1–10)</label>
            <input type="number" id="mood" name="mood" min="1" max="10">
        </div>

        <div class="field">
            <label for="energy">Energy (1–10)</label>
            <input type="number" id="energy" name="energy" min="1" max="10">
        </div>

        <div class="field">
            <label for="anxiety">Anxiety (1–10)</label>
            <input type="number" id="anxiety" name="anxiety" min="1" max="10">
        </div>

        <h2>Today So Far</h2>

        <div class="field">
            <label for="coffee">Coffee (cups so far)</label>
            <input type="number" id="coffee" name="coffee" min="0" max="20">
        </div>

        <div class="field">
            <label for="intrusive">Intrusive thoughts / flashbacks (0–5)</label>
            <div class="hint">0 = none · 1 = one brief instance · 5 = severe or frequent</div>
            <input type="number" id="intrusive" name="intrusive" min="0" max="5">
        </div>

        <div class="field">
            <label for="meals">Meals</label>
            <input type="number" id="meals" name="meals" min="0" max="10">
        </div>

        <div class="field">
            <label for="snacks">Non-meal snacks</label>
            <input type="number" id="snacks" name="snacks" min="0" max="20">
        </div>

        <div class="field">
            <label for="exercise_minutes">Exercise (minutes)</label>
            <div class="hint">Intentional activity only. Cumulative for the day.</div>
            <input type="number" id="exercise_minutes" name="exercise_minutes" min="0" max="480">
        </div>

        <div class="field">
            <label for="sunlight_minutes">Direct sunlight (minutes)</label>
            <div class="hint">Cumulative for the day.</div>
            <input type="number" id="sunlight_minutes" name="sunlight_minutes" min="0" max="480">
        </div>

        <div class="field">
            <label for="hours_worked">Hours worked</label>
            <input type="number" id="hours_worked" name="hours_worked" min="0" max="24" step="0.5">
        </div>

        <button type="submit">Save Update</button>
    </form>
</body>
</html>
